vulnerabilities:
  # ── CVE ─────────────────────────────────────────────
  - category: "cve"
    vendor: "Apache Airflow"
    vendor_logo: "/assets/vendors/AirflowLogo.svg"
    cve: "CVE-2026-25604"
    cve_url: "https://nvd.nist.gov/vuln/detail/CVE-2026-25604"
    cvss: "7.5"
    severity: "High"
    type: "인증 우회"
    title: "AWS Auth Manager SAML 인증 우회를 유발하는 Host 헤더 인젝션"
    description: >
      AWS Auth Manager가 클라이언트가 제공한 Host 헤더를 사용하여 SAML
      Assertion Consumer Service URL을 구성함으로써, 공격자가 공격자 제어
      서버에서 유효한 SAML 응답을 캡처하여 피해자 Airflow 인스턴스에 재전송하거나
      서로 다른 접근 권한을 가진 인스턴스 간에 토큰을 재사용할 수 있었음.
      apache-airflow-providers-amazon 9.22.0에서 수정됨.
    links:
      - label: "NVD"
        url: "https://nvd.nist.gov/vuln/detail/CVE-2026-25604"
      - label: "수정 PR"
        url: "https://github.com/apache/airflow/pull/61368"
      - label: "PoC"
        url: "https://github.com/John-Jung/CVE-2026-25604-PoC"

  - category: "cve"
    vendor: "TanStack Query"
    vendor_logo: "/assets/vendors/tanstackLogo.webp"
    cve: "CVE-2026-26903"
    cve_url: "https://nvd.nist.gov/vuln/detail/CVE-2026-26903"
    cvss: "5.3"
    severity: "Medium"
    type: "서비스 거부"
    title: "replaceEqualDeep의 무제한 재귀를 통한 서비스 거부"
    description: >
      내부 함수 replaceEqualDeep가 깊이 제한이나 순환 탐지 없이 중첩 객체를
      재귀적으로 비교하여, 5,000단계 이상 중첩된 객체가 포함된 단일 쿼리 업데이트만으로
      JavaScript 콜 스택을 소진시키고 페이지를 새로고침할 때까지 UI 스레드를
      정지시킬 수 있었음. @tanstack/query-core 5.90.17에서 깊이 제한 500 추가로 수정됨.
    links:
      - label: "NVD"
        url: "https://nvd.nist.gov/vuln/detail/CVE-2026-26903"
      - label: "수정 PR"
        url: "https://github.com/TanStack/query/pull/10032"
      - label: "PoC"
        url: "https://github.com/John-Jung/CVE-2026-26903-PoC"

