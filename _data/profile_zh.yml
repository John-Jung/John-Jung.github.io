vulnerabilities:
  # ── CVE ─────────────────────────────────────────────
  - category: "cve"
    vendor: "Apache Airflow"
    vendor_logo: "/assets/vendors/AirflowLogo.svg"
    cve: "CVE-2026-25604"
    cve_url: "https://nvd.nist.gov/vuln/detail/CVE-2026-25604"
    type: "认证绕过"
    title: "Host 头注入导致 AWS Auth Manager SAML 认证绕过"
    description: >
      AWS Auth Manager 使用客户端提供的 Host 头构建 SAML Assertion Consumer
      Service URL，使攻击者能够在攻击者控制的服务器上捕获有效的 SAML 响应，
      并将其重放到受害者的 Airflow 实例，或在具有不同访问控制的实例之间复用令牌。
      已在 apache-airflow-providers-amazon 9.22.0 中修复。
    links:
      - label: "NVD"
        url: "https://nvd.nist.gov/vuln/detail/CVE-2026-25604"
      - label: "修复 PR"
        url: "https://github.com/apache/airflow/pull/61368"
      - label: "PoC"
        url: "https://github.com/John-Jung/CVE-2026-25604-PoC"

  - category: "cve"
    vendor: "TanStack Query"
    vendor_logo: "/assets/vendors/tanstackLogo.webp"
    cve: "CVE-2026-26903"
    cve_url: "https://nvd.nist.gov/vuln/detail/CVE-2026-26903"
    type: "拒绝服务"
    title: "replaceEqualDeep 无限递归导致的拒绝服务"
    description: >
      内部函数 replaceEqualDeep 在没有深度限制或循环检测的情况下递归比较嵌套对象。
      仅包含一个嵌套超过 5,000 层的对象的单次查询更新即可耗尽 JavaScript 调用栈，
      并冻结 UI 线程直到页面刷新。已在 @tanstack/query-core 5.90.17 中通过添加
      500 层深度限制修复。
    links:
      - label: "NVD"
        url: "https://nvd.nist.gov/vuln/detail/CVE-2026-26903"
      - label: "修复 PR"
        url: "https://github.com/TanStack/query/pull/10032"
      - label: "PoC"
        url: "https://github.com/John-Jung/CVE-2026-26903-PoC"

