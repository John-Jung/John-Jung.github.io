vulnerabilities:
  # ── CVEs ─────────────────────────────────────────────
  - category: "cve"
    vendor: "Apache Airflow"
    vendor_logo: "/assets/vendors/AirflowLogo.svg"
    cve: "CVE-2026-25604"
    cve_url: "https://nvd.nist.gov/vuln/detail/CVE-2026-25604"
    cvss: "7.5"
    severity: "High"
    type: "Authentication Bypass"
    title: "Host Header Injection leading to SAML authentication bypass in AWS Auth Manager"
    description: >
      The AWS Auth Manager constructed the SAML Assertion Consumer Service
      URL using the client-supplied Host header, allowing an attacker to
      capture valid SAML responses on an attacker-controlled server and
      replay them against the victim Airflow instance — or reuse tokens
      across different instances with different access controls. Fixed in
      apache-airflow-providers-amazon 9.22.0.
    links:
      - label: "NVD"
        url: "https://nvd.nist.gov/vuln/detail/CVE-2026-25604"
      - label: "Fix PR"
        url: "https://github.com/apache/airflow/pull/61368"
      - label: "PoC"
        url: "https://github.com/John-Jung/CVE-2026-25604-PoC"
 
  - category: "cve"
    vendor: "TanStack Query"
    vendor_logo: "/assets/vendors/tanstackLogo.webp"
    cve: "CVE-2026-26903"
    cve_url: "https://nvd.nist.gov/vuln/detail/CVE-2026-26903"
    cvss: "5.3"
    severity: "Medium"
    type: "Denial of Service"
    title: "Denial of Service via unbounded recursion in replaceEqualDeep"
    description: >
      The internal replaceEqualDeep function recursively compared nested
      objects without any depth limit or cycle detection. A single query
      update containing an object nested 5,000+ levels deep was enough to
      exhaust the JavaScript call stack and freeze the UI thread until a
      page reload. Fixed in @tanstack/query-core 5.90.17 by adding a
      depth cap of 500.
    links:
      - label: "NVD"
        url: "https://nvd.nist.gov/vuln/detail/CVE-2026-26903"
      - label: "Fix PR"
        url: "https://github.com/TanStack/query/pull/10032"
      - label: "PoC"
        url: "https://github.com/John-Jung/CVE-2026-26903-PoC"
 
