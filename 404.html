<!DOCTYPE html>
<html lang="ko" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Not Found</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <script>
    (function(){var t=localStorage.getItem('theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t);})();
  </script>
    <style>
  html, body{margin:0;padding:0;height:100%}
  .err-wrap{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:2rem;
    gap:.25rem;
    box-sizing:border-box;
    }
    .err-code{font-size:6rem;font-weight:700;margin:0;letter-spacing:-.05em;line-height:1}
    .err-msg{font-size:1.05rem;opacity:.75;margin:.25rem 0;line-height:1.6}
    .err-msg .sep{opacity:.4;margin:0 .5rem}
    .err-home{display:inline-block;margin-top:1.75rem;padding:.65rem 1.5rem;border:1px solid currentColor;border-radius:6px;text-decoration:none;color:inherit;transition:all .15s ease}
    .err-home:hover{
      background:rgba(37,99,235,0.08);
      border-color:#2563EB;
      color:#2563EB;
    }
  </style>
</head>
<body>
  <main class="err-wrap">
    <h1 class="err-code">404</h1>
    <p class="err-msg">
      페이지를 찾을 수 없습니다
      <span class="sep">·</span>

      <span class="sep">·</span>
