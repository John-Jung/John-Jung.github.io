<svg width="100%" viewBox="0 0 880 460" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Post-exploit fund flow</title>
  <desc>Stolen rsETH was distributed to Aave, Arbitrum (frozen), and THORChain laundering paths.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .ff { font-family: "Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box-red    { fill: rgb(121, 31, 31); stroke: rgb(240, 149, 149); stroke-width: 0.5; }
      .box-amber  { fill: rgb(99, 56, 6);   stroke: rgb(239, 159, 39);  stroke-width: 0.5; }
      .box-green  { fill: rgb(34, 70, 17);  stroke: rgb(151, 196, 113); stroke-width: 0.5; }
      .box-gray   { fill: rgb(68, 68, 65);  stroke: rgb(180, 178, 169); stroke-width: 0.5; }
      .t-red-1    { fill: rgb(247, 193, 193); font-size: 13px; font-weight: 500; }
      .t-red-2    { fill: rgb(240, 149, 149); font-size: 11px; }
      .t-amber-1  { fill: rgb(250, 199, 117); font-size: 13px; font-weight: 500; }
      .t-amber-2  { fill: rgb(239, 159, 39);  font-size: 11px; }
      .t-green-1  { fill: rgb(190, 222, 153); font-size: 13px; font-weight: 500; }
      .t-green-2  { fill: rgb(151, 196, 113); font-size: 11px; }
      .t-gray-1   { fill: rgb(211, 209, 199); font-size: 13px; font-weight: 500; }
      .t-gray-2   { fill: rgb(180, 178, 169); font-size: 11px; }
      .edge       { stroke: rgb(180, 178, 169); stroke-width: 1; fill: none; }
      .edge-red   { stroke: rgb(163, 45, 45);   stroke-width: 1; fill: none; }
      .edge-green { stroke: rgb(91, 130, 56);   stroke-width: 1; fill: none; }
      .edge-label { fill: rgb(194, 192, 182); font-size: 11px; }
    </style>
  </defs>

  <!-- Source: Exploit TX -->
  <rect class="box-red" x="20" y="190" width="160" height="60" rx="8"/>
  <text class="ff t-red-1" x="100" y="210" text-anchor="middle">Exploit TX</text>
  <text class="ff t-red-2" x="100" y="226" text-anchor="middle">116,500 rsETH</text>
  <text class="ff t-red-2" x="100" y="240" text-anchor="middle">~$292M</text>

  <!-- Attacker wallet -->
  <rect class="box-red" x="240" y="190" width="180" height="60" rx="8"/>
  <text class="ff t-red-1" x="330" y="210" text-anchor="middle">Attacker wallet</text>
  <text class="ff t-red-2" x="330" y="226" text-anchor="middle">0x8B1b…0D3b</text>
  <text class="ff t-red-2" x="330" y="240" text-anchor="middle">Suspected DPRK / Lazarus</text>

  <!-- Arrow: TX -> wallet -->
  <line class="edge-red" x1="180" y1="220" x2="240" y2="220" marker-end="url(#arrow)"/>

  <!-- Branch 1: Aave (top) -->
  <rect class="box-red" x="500" y="40" width="280" height="80" rx="8"/>
  <text class="ff t-red-1" x="640" y="62" text-anchor="middle">Aave V3 — collateral deposit</text>
  <text class="ff t-red-2" x="640" y="80" text-anchor="middle">116,500 rsETH locked as collateral</text>
  <text class="ff t-red-2" x="640" y="96" text-anchor="middle">Borrowed WETH against it</text>
  <text class="ff t-red-2" x="640" y="111" text-anchor="middle">Status: frozen on Aave, bad-debt risk</text>

  <!-- Branch 2: Arbitrum freeze (middle) -->
  <rect class="box-green" x="500" y="180" width="280" height="80" rx="8"/>
  <text class="ff t-green-1" x="640" y="202" text-anchor="middle">Arbitrum Security Council</text>
  <text class="ff t-green-2" x="640" y="220" text-anchor="middle">EMERGENCY FREEZE invoked</text>
  <text class="ff t-green-2" x="640" y="236" text-anchor="middle">30,766 ETH (~$71M) recovered</text>
  <text class="ff t-green-2" x="640" y="251" text-anchor="middle">Status: pending DAO vote</text>

  <!-- Branch 3: THORChain (bottom) -->
  <rect class="box-amber" x="500" y="320" width="280" height="80" rx="8"/>
  <text class="ff t-amber-1" x="640" y="342" text-anchor="middle">THORChain — ETH→BTC swap</text>
  <text class="ff t-amber-2" x="640" y="360" text-anchor="middle">~34,500 ETH (~$80M)</text>
  <text class="ff t-amber-2" x="640" y="376" text-anchor="middle">Then: Umbra mixer / BitTorrent / CEX</text>
  <text class="ff t-amber-2" x="640" y="391" text-anchor="middle">Status: laundered, mostly unrecoverable</text>

  <!-- Branching arrows from wallet -->
  <path class="edge-red"   d="M 420 210 C 460 210, 460 80,  500 80"  marker-end="url(#arrow)"/>
  <path class="edge-green" d="M 420 220 L 500 220" marker-end="url(#arrow)"/>
  <path class="edge-red"   d="M 420 230 C 460 230, 460 360, 500 360" marker-end="url(#arrow)"/>

  <!-- Edge labels -->
  <text class="ff edge-label" x="430" y="120">collateralize</text>
  <text class="ff edge-label" x="430" y="208">frozen</text>
  <text class="ff edge-label" x="430" y="320">launder</text>

  <!-- Legend -->
  <rect x="20" y="420" width="12" height="12" rx="2" fill="rgb(121, 31, 31)" stroke="rgb(240, 149, 149)" stroke-width="0.5"/>
  <text class="ff" x="38" y="431" style="fill:rgb(194,192,182);font-size:11px">Attacker-controlled / at risk</text>
  <rect x="220" y="420" width="12" height="12" rx="2" fill="rgb(34, 70, 17)" stroke="rgb(151, 196, 113)" stroke-width="0.5"/>
  <text class="ff" x="238" y="431" style="fill:rgb(194,192,182);font-size:11px">Recovered</text>
  <rect x="320" y="420" width="12" height="12" rx="2" fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
  <text class="ff" x="338" y="431" style="fill:rgb(194,192,182);font-size:11px">Laundered / hard to recover</text>
</svg>
