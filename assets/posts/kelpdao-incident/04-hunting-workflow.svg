<svg width="100%" viewBox="0 0 800 800" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Hunting workflow — DVN configuration audit decision tree</title>
  <desc>Decision tree for evaluating whether a target OApp's DVN configuration constitutes a credible bug bounty finding.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .ff { font-family: "Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box-gray   { fill: rgb(68, 68, 65);   stroke: rgb(180, 178, 169); stroke-width: 0.5; }
      .box-red    { fill: rgb(121, 31, 31); stroke: rgb(240, 149, 149); stroke-width: 0.5; }
      .box-amber  { fill: rgb(99, 56, 6);   stroke: rgb(239, 159, 39);  stroke-width: 0.5; }
      .box-green  { fill: rgb(34, 70, 17);  stroke: rgb(151, 196, 113); stroke-width: 0.5; }
      .box-blue   { fill: rgb(12, 68, 124); stroke: rgb(133, 183, 235); stroke-width: 0.5; }
      .diamond    { fill: rgb(68, 68, 65);  stroke: rgb(180, 178, 169); stroke-width: 0.5; }
      .t-gray-1   { fill: rgb(211, 209, 199); font-size: 13px; font-weight: 500; }
      .t-gray-2   { fill: rgb(180, 178, 169); font-size: 11px; }
      .t-red-1    { fill: rgb(247, 193, 193); font-size: 13px; font-weight: 500; }
      .t-red-2    { fill: rgb(240, 149, 149); font-size: 11px; }
      .t-amber-1  { fill: rgb(250, 199, 117); font-size: 13px; font-weight: 500; }
      .t-amber-2  { fill: rgb(239, 159, 39);  font-size: 11px; }
      .t-green-1  { fill: rgb(190, 222, 153); font-size: 13px; font-weight: 500; }
      .t-blue-1   { fill: rgb(181, 212, 244); font-size: 13px; font-weight: 500; }
      .t-blue-2   { fill: rgb(133, 183, 235); font-size: 11px; }
      .t-diamond  { fill: rgb(211, 209, 199); font-size: 13px; font-weight: 500; }
      .edge       { stroke: rgb(180, 178, 169); stroke-width: 1; fill: none; }
      .edge-red   { stroke: rgb(163, 45, 45);   stroke-width: 1; fill: none; }
      .edge-green { stroke: rgb(91, 130, 56);   stroke-width: 1; fill: none; }
      .edge-amber { stroke: rgb(160, 100, 30);  stroke-width: 1; fill: none; }
      .edge-label    { fill: rgb(211, 209, 199); font-size: 11px; }
      .edge-label-bg { fill: rgb(20, 20, 18); }
    </style>
  </defs>

  <!-- ============== Step 1: Pick target OApp ============== -->
  <rect class="box-gray" x="300" y="20" width="200" height="44" rx="8"/>
  <text class="ff t-gray-1" x="400" y="46" text-anchor="middle">Pick target OApp</text>

  <!-- Step 1 -> Step 2 -->
  <line class="edge" x1="400" y1="64" x2="400" y2="84" marker-end="url(#arrow)"/>

  <!-- ============== Step 2: Read DVN config ============== -->
  <rect class="box-gray" x="290" y="84" width="220" height="50" rx="8"/>
  <text class="ff t-gray-1" x="400" y="106" text-anchor="middle">Read DVN config</text>
  <text class="ff t-gray-2" x="400" y="122" text-anchor="middle">EndpointV2.getConfig() via cast</text>

  <!-- Step 2 -> D1 -->
  <line class="edge" x1="400" y1="134" x2="400" y2="165" marker-end="url(#arrow)"/>

  <!-- ============== D1: Quorum threshold? ============== -->
  <polygon class="diamond" points="400,165 470,200 400,235 330,200"/>
  <text class="ff t-diamond" x="400" y="196" text-anchor="middle">Quorum</text>
  <text class="ff t-diamond" x="400" y="212" text-anchor="middle">threshold?</text>

  <!-- ============== Red flag (LEFT side, at D1 row) ============== -->
  <rect class="box-red" x="40" y="175" width="160" height="50" rx="8"/>
  <text class="ff t-red-1" x="120" y="197" text-anchor="middle">Red flag</text>
  <text class="ff t-red-2" x="120" y="213" text-anchor="middle">Single point of failure</text>

  <!-- D1.left ("1-of-1 or 1-of-2") -> Red flag -->
  <line class="edge-red" x1="330" y1="200" x2="200" y2="200" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="222" y="184" width="92" height="14" rx="2"/>
  <text class="ff edge-label" x="268" y="195" text-anchor="middle">1-of-1 or 1-of-2</text>

  <!-- D1.right ("2-of-3 or higher") -> D2 -->
  <line class="edge" x1="400" y1="235" x2="400" y2="285" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="406" y="248" width="100" height="14" rx="2"/>
  <text class="ff edge-label" x="412" y="259">2-of-3 or higher</text>

  <!-- ============== D2: Operator independence? ============== -->
  <polygon class="diamond" points="400,285 480,320 400,355 320,320"/>
  <text class="ff t-diamond" x="400" y="316" text-anchor="middle">Operator</text>
  <text class="ff t-diamond" x="400" y="332" text-anchor="middle">independence?</text>

  <!-- D2.left ("All same operator") -> Red flag (route through left lane to avoid D1.left) -->
  <path class="edge-red" d="M 320 320 L 260 320 L 260 230 L 200 230" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="195" y="265" width="105" height="14" rx="2"/>
  <text class="ff edge-label" x="248" y="276" text-anchor="middle">All same operator</text>

  <!-- D2.right ("Truly independent") -> D3 -->
  <line class="edge" x1="400" y1="355" x2="400" y2="405" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="406" y="368" width="100" height="14" rx="2"/>
  <text class="ff edge-label" x="412" y="379">Truly independent</text>

  <!-- ============== D3: Asset value at risk? ============== -->
  <polygon class="diamond" points="400,405 480,440 400,475 320,440"/>
  <text class="ff t-diamond" x="400" y="436" text-anchor="middle">Asset value</text>
  <text class="ff t-diamond" x="400" y="452" text-anchor="middle">at risk?</text>

  <!-- D3.left ("Low") -> Acceptable risk -->
  <path class="edge-green" d="M 320 440 L 240 440 L 240 540" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="246" y="424" width="40" height="14" rx="2"/>
  <text class="ff edge-label" x="266" y="435" text-anchor="middle">Low</text>

  <!-- D3.right ("High") -> Yellow flag -->
  <path class="edge-amber" d="M 480 440 L 560 440 L 560 540" marker-end="url(#arrow)"/>
  <rect class="edge-label-bg" x="514" y="424" width="92" height="14" rx="2"/>
  <text class="ff edge-label" x="560" y="435" text-anchor="middle">High — $10M+</text>

  <!-- ============== Acceptable risk (END) ============== -->
  <rect class="box-green" x="160" y="540" width="160" height="44" rx="8"/>
  <text class="ff t-green-1" x="240" y="566" text-anchor="middle">Acceptable risk — END</text>

  <!-- ============== Yellow flag ============== -->
  <rect class="box-amber" x="480" y="540" width="160" height="50" rx="8"/>
  <text class="ff t-amber-1" x="560" y="562" text-anchor="middle">Yellow flag</text>
  <text class="ff t-amber-2" x="560" y="578" text-anchor="middle">Investigate further</text>

  <!-- ============== Build Foundry PoC (centered, bottom) ============== -->
  <rect class="box-blue" x="320" y="660" width="160" height="50" rx="8"/>
  <text class="ff t-blue-1" x="400" y="682" text-anchor="middle">Build Foundry PoC</text>
  <text class="ff t-blue-2" x="400" y="698" text-anchor="middle">Demonstrate trust gap</text>

  <!-- Red flag -> Build PoC: down from Red flag, then right and into PoC from left -->
  <path class="edge-red" d="M 120 225 L 120 685 L 320 685" marker-end="url(#arrow)"/>

  <!-- Yellow flag -> Build PoC: down from Yellow flag, then left into PoC from right -->
  <path class="edge-amber" d="M 560 590 L 560 685 L 480 685" marker-end="url(#arrow)"/>

  <!-- Build PoC -> Submit finding -->
  <line class="edge" x1="400" y1="710" x2="400" y2="740" marker-end="url(#arrow)"/>

  <!-- ============== Submit finding ============== -->
  <rect class="box-blue" x="340" y="740" width="120" height="40" rx="8"/>
  <text class="ff t-blue-1" x="400" y="764" text-anchor="middle">Submit finding</text>

  <!-- ============== Legend (top-left corner) ============== -->
  <rect x="20" y="22" width="12" height="12" rx="2" fill="rgb(121, 31, 31)" stroke="rgb(240, 149, 149)" stroke-width="0.5"/>
  <text class="ff" x="38" y="33" style="fill:rgb(194,192,182);font-size:11px">Critical finding</text>
  <rect x="20" y="42" width="12" height="12" rx="2" fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
  <text class="ff" x="38" y="53" style="fill:rgb(194,192,182);font-size:11px">Investigate further</text>
  <rect x="20" y="62" width="12" height="12" rx="2" fill="rgb(34, 70, 17)" stroke="rgb(151, 196, 113)" stroke-width="0.5"/>
  <text class="ff" x="38" y="73" style="fill:rgb(194,192,182);font-size:11px">Acceptable</text>
  <rect x="20" y="82" width="12" height="12" rx="2" fill="rgb(12, 68, 124)" stroke="rgb(133, 183, 235)" stroke-width="0.5"/>
  <text class="ff" x="38" y="93" style="fill:rgb(194,192,182);font-size:11px">Action / output</text>
</svg>
